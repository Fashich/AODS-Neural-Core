<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/aods-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AODS - Autonomous Orchestration of Digital Systems. The Holographic Enterprise Metaverse." />
    <meta name="theme-color" content="#0a0a1a" />
    <title>AODS - Autonomous Orchestration of Digital Systems</title>
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="AODS - Autonomous Orchestration of Digital Systems" />
    <meta property="og:description" content="The Holographic Enterprise Metaverse powered by 9 programming languages and AI-driven orchestration." />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AODS - Autonomous Orchestration of Digital Systems" />
    <meta name="twitter:description" content="The Holographic Enterprise Metaverse powered by 9 programming languages and AI-driven orchestration." />
    
    <style>
      /* Critical CSS for loading screen */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(ellipse at 40% 40%, #1a0505 0%, #0d0000 40%, #000 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-spinner {
        width: 60px;
        height: 60px;
        border: 2px solid rgba(239, 68, 68, 0.15);
        border-top-color: #ef4444;
        border-right-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .loading-text {
        margin-top: 20px;
        color: #f87171;
        font-family: 'Orbitron', monospace;
        font-size: 13px;
        letter-spacing: 3px;
        text-shadow: 0 0 12px rgba(239, 68, 68, 0.7);
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">INITIALIZING NEURAL CORE...</div>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Hide loading screen when app is ready
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.classList.add('hidden');
            setTimeout(() => {
              loadingScreen.remove();
            }, 500);
          }
        }, 1500);
      });
    </script>
  </body>
</html>
