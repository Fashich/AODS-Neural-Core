# AODS - Render Deployment Configuration
# Deploy all microservices to Render

services:
  # API Gateway
  - type: web
    name: aods-api-gateway
    runtime: docker
    repo: https://github.com/your-org/aods
    dockerfilePath: ./docker/Dockerfile.api-gateway
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aods-neural-core
          property: connectionString
      - key: AI_SERVICE_URL
        value: https://aods-python-ai.onrender.com
      - key: TELEMETRY_SERVICE_URL
        value: https://aods-go-telemetry.onrender.com
      - key: MAYAR_API_KEY
        sync: false
      - key: MAYAR_SANDBOX
        value: "true"
    healthCheckPath: /health
    plan: standard

  # Python AI Service
  - type: web
    name: aods-python-ai
    runtime: docker
    repo: https://github.com/your-org/aods
    dockerfilePath: ./docker/Dockerfile.python-ai
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aods-neural-core
          property: connectionString
      - key: PORT
        value: "8001"
    healthCheckPath: /health
    plan: standard

  # Go Telemetry Service
  - type: web
    name: aods-go-telemetry
    runtime: docker
    repo: https://github.com/your-org/aods
    dockerfilePath: ./docker/Dockerfile.go-telemetry
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aods-neural-core
          property: connectionString
      - key: PORT
        value: "9002"
    healthCheckPath: /health
    plan: standard

  # C++ HPC Service
  - type: web
    name: aods-cpp-hpc
    runtime: docker
    repo: https://github.com/your-org/aods
    dockerfilePath: ./docker/Dockerfile.cpp-hpc
    envVars:
      - key: PORT
        value: "9003"
    healthCheckPath: /health
    plan: standard

  # C# Enterprise Service
  - type: web
    name: aods-csharp-enterprise
    runtime: docker
    repo: https://github.com/your-org/aods
    dockerfilePath: ./docker/Dockerfile.csharp-enterprise
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:9004
    healthCheckPath: /api/health
    plan: standard

  # Java Bridge Service
  - type: web
    name: aods-java-bridge
    runtime: docker
    repo: https://github.com/your-org/aods
    dockerfilePath: ./docker/Dockerfile.java-bridge
    envVars:
      - key: SERVER_PORT
        value: "9005"
      - key: SPRING_PROFILES_ACTIVE
        value: production
    healthCheckPath: /api/health
    plan: standard

  # PHP Connector Service
  - type: web
    name: aods-php-connector
    runtime: docker
    repo: https://github.com/your-org/aods
    dockerfilePath: ./docker/Dockerfile.php-connector
    healthCheckPath: /health
    plan: starter

  # Ruby Automation Service
  - type: web
    name: aods-ruby-automation
    runtime: docker
    repo: https://github.com/your-org/aods
    dockerfilePath: ./docker/Dockerfile.ruby-automation
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: aods-redis
          property: connectionString
      - key: RACK_ENV
        value: production
    healthCheckPath: /health
    plan: starter

  # Redis for job queue
  - type: redis
    name: aods-redis
    plan: starter
    ipAllowList: []

# Database
databases:
  - name: aods-neural-core
    databaseName: aods_neural_core
    user: aods_admin
    plan: standard
    postgresMajorVersion: "15"
    previewPlan: starter
    region: singapore
    ipAllowList: []
