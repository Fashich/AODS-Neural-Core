# AODS - Render Deployment Blueprint
# Free tier compatible
# Ganti Fashich dengan username GitHub kamu

services:
  # ── API Gateway (PRIORITAS UTAMA) ──────────────────────────────
  - type: web
    name: aods-api-gateway
    runtime: docker
    repo: https://github.com/Fashich/AODS-Neural-Core
    dockerfilePath: ./docker/Dockerfile.api-gateway
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AI_SERVICE_URL
        value: https://aods-python-ai.onrender.com
      - key: TELEMETRY_SERVICE_URL
        value: https://aods-go-telemetry.onrender.com
      - key: MAYAR_API_KEY
        sync: false
      - key: MAYAR_SANDBOX
        value: "true"
      - key: PORT
        value: "9000"
    healthCheckPath: /health

  # ── Python AI Service ───────────────────────────────────────────
  - type: web
    name: aods-python-ai
    runtime: docker
    repo: https://github.com/Fashich/AODS-Neural-Core
    dockerfilePath: ./docker/Dockerfile.python-ai
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: "9001"
    healthCheckPath: /health

  # ── Go Telemetry Service ────────────────────────────────────────
  - type: web
    name: aods-go-telemetry
    runtime: docker
    repo: https://github.com/Fashich/AODS-Neural-Core
    dockerfilePath: ./docker/Dockerfile.go-telemetry
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: "9002"
    healthCheckPath: /health

  # ── C++ HPC Service ─────────────────────────────────────────────
  - type: web
    name: aods-cpp-hpc
    runtime: docker
    repo: https://github.com/Fashich/AODS-Neural-Core
    dockerfilePath: ./docker/Dockerfile.cpp-hpc
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: "9003"
    healthCheckPath: /health

  # ── C# Enterprise Service ───────────────────────────────────────
  - type: web
    name: aods-csharp-enterprise
    runtime: docker
    repo: https://github.com/Fashich/AODS-Neural-Core
    dockerfilePath: ./docker/Dockerfile.csharp-enterprise
    dockerContext: .
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:9004
    healthCheckPath: /api/health

  # ── Java Bridge Service ─────────────────────────────────────────
  - type: web
    name: aods-java-bridge
    runtime: docker
    repo: https://github.com/Fashich/AODS-Neural-Core
    dockerfilePath: ./docker/Dockerfile.java-bridge
    dockerContext: .
    plan: free
    envVars:
      - key: SERVER_PORT
        value: "9005"
      - key: SPRING_PROFILES_ACTIVE
        value: production
    healthCheckPath: /api/health

  # ── PHP Connector Service ───────────────────────────────────────
  - type: web
    name: aods-php-connector
    runtime: docker
    repo: https://github.com/Fashich/AODS-Neural-Core
    dockerfilePath: ./docker/Dockerfile.php-connector
    dockerContext: .
    plan: free
    healthCheckPath: /health

  # ── Ruby Automation Service ─────────────────────────────────────
  - type: web
    name: aods-ruby-automation
    runtime: docker
    repo: https://github.com/Fashich/AODS-Neural-Core
    dockerfilePath: ./docker/Dockerfile.ruby-automation
    dockerContext: .
    plan: free
    envVars:
      - key: RACK_ENV
        value: production
      - key: PORT
        value: "9007"
    healthCheckPath: /health
