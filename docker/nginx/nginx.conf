events {
    worker_connections 1024;
}

http {
    upstream api_gateway {
        server api-gateway:9000;
    }

    upstream python_ai {
        server python-ai:9001;
    }

    upstream go_telemetry {
        server go-telemetry:9002;
    }

    upstream cpp_hpc {
        server cpp-hpc:9003;
    }

    upstream csharp_enterprise {
        server csharp-enterprise:9004;
    }

    upstream java_bridge {
        server java-bridge:9005;
    }

    upstream php_connector {
        server php-connector:9006;
    }

    upstream ruby_automation {
        server ruby-automation:9007;
    }

    server {
        listen 80;
        server_name _;

        # Default - route to API Gateway
        location / {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # AI Service
        location /ai/ {
            proxy_pass http://python_ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Telemetry Service
        location /telemetry/ {
            proxy_pass http://go_telemetry/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # HPC Service
        location /hpc/ {
            proxy_pass http://cpp_hpc/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Enterprise Service
        location /enterprise/ {
            proxy_pass http://csharp_enterprise/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Java Bridge
        location /bridge/ {
            proxy_pass http://java_bridge/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # PHP Connector
        location /connector/ {
            proxy_pass http://php_connector/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Ruby Automation
        location /automation/ {
            proxy_pass http://ruby_automation/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
